<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCBuid</title>

    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/landing.css}">

    <style>
        body {
            background:
                radial-gradient(circle at top, rgba(180, 0, 0, 0.18), transparent 30%),
                linear-gradient(135deg, #070707 0%, #121212 45%, #1a1a1a 100%);
        }

        .full-strip {
            width: 100%;
            background: rgba(35, 35, 35, 0.82);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(8px);
        }

        .brand-img {
            width: 64px;
            height: 64px;
            object-fit: cover;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(220, 53, 69, 0.35);
        }

        .hero-title {
            text-shadow: 0 0 22px rgba(220, 53, 69, 0.22);
        }
    </style>
</head>

<body class="bg-black text-white min-vh-100">

    <div class="container-fluid min-vh-100 d-flex flex-column justify-content-between p-0">

        <header class="full-strip d-flex align-items-center justify-content-between px-3 px-md-5 py-3">
            <div class="d-flex align-items-center gap-3">
                <img th:src="@{/images/placeholder.png}" alt="Placeholder" class="brand-img">
                <nav class="d-flex gap-4">
                    <a th:href="@{/}" class="link-light text-decoration-none fw-semibold">Inicio</a>
                    <a th:href="@{/contacto}" class="link-light text-decoration-none fw-semibold">Contáctanos</a>
                </nav>
            </div>
        </header>

        <main class="flex-grow-1 d-flex align-items-center justify-content-center text-center px-3">
            <div>
                <h1 class="display-1 fw-bold mb-3 hero-title">Buildea el pc de tus sueños</h1>

                <div class="d-flex justify-content-center gap-3 flex-wrap mt-5">
                    <a th:href="@{/registrarse}"
                        class="btn btn-danger btn-lg px-4 fw-semibold rounded-0">Registrarse</a>
                    <a th:href="@{/inicioSesion}"
                        class="btn btn-outline-danger btn-lg px-4 fw-semibold rounded-0">Iniciar sesión</a>
                </div>
            </div>
        </main>
        <footer class="full-strip d-flex align-items-center justify-content-center px-3 px-md-5 py-4"
            style="gap: 10px;">
            <a href="https://github.com/TU_USUARIO" target="_blank" rel="noopener noreferrer"
                class="link-light text-decoration-none fw-semibold">
                GitHub
            </a>

            <span class="fw-semibold"> © PCBuid 2026</span>
        </footer>

    </div>

</body>

</html>
