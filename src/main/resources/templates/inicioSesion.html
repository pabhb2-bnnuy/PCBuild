<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCBuid | Iniciar sesión</title>
    <link rel="stylesheet" th:href="@{css/style.css}">
    <link rel="shortcut icon" th:href="@{media/small1.svg}" type="image/x-icon">
</head>

<body>

    <!-- Cabezera -->
     <header>

        <div class="container1">
            <div><a th:href="@{/}"><img th:src="@{media/full1.svg}" alt="pcbuild_logo" width="150px"></a></div>
        </div>
    </header>

    <!-- Main, Cuerpo -->
    <main>


        <div class="form-reg">
            <h1 class="h1reg" style="margin-left: -40px;">Iniciar sesión</h1>

            <form th:action="@{/inicioSesion}" method="post">

                <!-- div para el email -->
                <div>
                    <label for="email" class="reg-txt">Email</label>
                    <br>
                    <input type="email" id="email" name="mail" placeholder="tu@email.com" required class="input-reg">
                </div>
                <!-- divs para la contraseña -->
                <div>
                    <label for="password" class="reg-txt">Contraseña</label>
                    <br>
                    <input type="password" id="password" name="password" required class="input-reg"
                        placeholder="********">
                    <div class="reg-txt">
                        <input type="checkbox" id="remember-me" name="remember-me">
                        <label for="remember-me">
                            Remember me
                        </label>
                    </div>
                </div>

                <input type="submit" value="Iniciar sesión" class="input-regs">


            </form>
        </div>
    </main>


    <!-- Pie de página -->
    <footer style="margin-top: 120px;">

        <div class="containerfooter">

            <div><span class="spanfooter">2026</span></div>

            <a href="index.html">
                <div><span class="spanfooter">PCBuild©</span></div>
            </a>

            <a href="https://github.com/pabhb2-bnnuy">

                <div><img th:src="@{media/github.svg}" alt="github_logo" width="20px">
                </div>
            </a>
        </div>
    </footer>
</body>

</html>
